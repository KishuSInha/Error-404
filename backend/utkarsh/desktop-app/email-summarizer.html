<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Summarizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            color: #1A1A1A;
            overflow: hidden;
            -webkit-app-region: no-drag;
        }

        .app-container {
            width: 400px;
            height: 600px;
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Custom Title Bar */
        .title-bar {
            height: 60px;
            background: #FFFFFF;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            -webkit-app-region: drag;
        }

        .title-bar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-icon {
            font-size: 24px;
        }

        .app-title {
            font-size: 14px;
            font-weight: 600;
            color: #1A1A1A;
        }

        .title-bar-buttons {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .title-bar-button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .title-bar-button:hover {
            opacity: 0.8;
        }

        .close-btn {
            background: #ff5f57;
        }

        .minimize-btn {
            background: #ffbd2e;
        }

        /* Main Content */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
            background: #FFFFFF;
        }

        /* Action Button */
        .action-section {
            margin-bottom: 24px;
        }

        .summarize-btn {
            width: 100%;
            height: 60px;
            background: #74D4FB;
            border: none;
            border-radius: 12px;
            color: #1A1A1A;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(116, 212, 251, 0.2);
        }

        .summarize-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(116, 212, 251, 0.3);
            background: #64C4EB;
        }

        .summarize-btn:active {
            transform: translateY(0);
        }

        .summarize-btn.loading {
            background: #74D4FB;
            opacity: 0.7;
            cursor: wait;
        }

        .summarize-btn .icon {
            font-size: 20px;
        }

        /* Summary Display */
        .summary-section {
            flex: 1;
            background: #F9F9F9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-y: auto;
            border: 1px solid #EEEEEE;
        }

        .summary-section.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999999;
            font-size: 14px;
            text-align: center;
        }

        .summary-header {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #EEEEEE;
        }

        .summary-meta {
            font-size: 12px;
            color: #999999;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .summary-subject {
            font-size: 15px;
            font-weight: 700;
            color: #1A1A1A;
        }

        .summary-content {
            font-size: 14px;
            line-height: 1.6;
            color: #444444;
            margin-bottom: 16px;
        }

        .summary-points {
            margin-top: 16px;
        }

        .summary-points-title {
            font-size: 13px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-points ul {
            list-style: none;
            padding-left: 0;
        }

        .summary-points li {
            font-size: 13px;
            color: #555555;
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
            line-height: 1.5;
        }

        .summary-points li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #74D4FB;
            font-weight: bold;
            font-size: 20px;
            line-height: 1;
            top: 4px;
        }

        /* History Section */
        .history-section {
            background: #F9F9F9;
            border-radius: 12px;
            padding: 16px;
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid #EEEEEE;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
        }

        .history-title {
            font-size: 12px;
            font-weight: 700;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .history-toggle {
            font-size: 12px;
            color: #999999;
        }

        .history-list {
            display: none;
        }

        .history-list.expanded {
            display: block;
        }

        .history-item {
            padding: 10px 0;
            border-bottom: 1px solid #EEEEEE;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item:hover {
            color: #74D4FB;
        }

        .history-item-title {
            font-size: 13px;
            color: #1A1A1A;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .history-item-time {
            font-size: 11px;
            color: #999999;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #F9F9F9;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: #EEEEEE;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #DDDDDD;
        }

        /* Loading Animation */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #1A1A1A;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Custom Title Bar -->
        <div class="title-bar">
            <div class="title-bar-left">
                <span class="app-icon">📧</span>
                <span class="app-title">Email Summarizer</span>
            </div>
            <div class="title-bar-buttons">
                <button class="title-bar-button close-btn" id="closeBtn"></button>
                <button class="title-bar-button minimize-btn" id="minimizeBtn"></button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Action Button -->
            <div class="action-section">
                <button class="summarize-btn" id="summarizeBtn">
                    <span class="icon">📸</span>
                    <span id="btnText">Summarize Email</span>
                </button>
            </div>

            <!-- Summary Display -->
            <div class="summary-section empty" id="summarySection">
                <p>Click "Summarize Email" to analyze your current email</p>
            </div>

            <!-- History -->
            <div class="history-section">
                <div class="history-header" id="historyHeader">
                    <span class="history-title">Recent Summaries</span>
                    <span class="history-toggle">▼</span>
                </div>
                <div class="history-list" id="historyList">
                    <!-- History items will be added here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Window controls
        document.getElementById('closeBtn').addEventListener('click', () => {
            window.close();
        });

        document.getElementById('minimizeBtn').addEventListener('click', () => {
            // Use IPC to minimize window
            if (window.api) {
                window.api.send('minimize-window');
            }
        });

        // History toggle
        document.getElementById('historyHeader').addEventListener('click', () => {
            const historyList = document.getElementById('historyList');
            historyList.classList.toggle('expanded');
        });

        // Summarize button
        const summarizeBtn = document.getElementById('summarizeBtn');
        const btnText = document.getElementById('btnText');
        const summarySection = document.getElementById('summarySection');

        summarizeBtn.addEventListener('click', async () => {
            // Disable button
            summarizeBtn.classList.add('loading');
            summarizeBtn.disabled = true;
            btnText.innerHTML = 'Analyzing<span class="loading-dots"><span></span><span></span><span></span></span>';

            try {
                // Capture screen and get text
                const screenText = await window.electronAPI.getScreenText();

                if (!screenText || screenText.trim().length === 0) {
                    throw new Error('No text detected on screen');
                }

                // Generate summary using AI
                const summary = await generateEmailSummary(screenText);

                // Display summary
                displaySummary(summary);

                // Add to history
                addToHistory(summary);

            } catch (error) {
                console.error('Summarization error:', error);
                summarySection.innerHTML = `
                    <div style="color: #ef4444; font-size: 14px;">
                        <p style="font-weight: 600; margin-bottom: 8px;">Error</p>
                        <p>${error.message}</p>
                    </div>
                `;
                summarySection.classList.remove('empty');
            } finally {
                // Re-enable button
                summarizeBtn.classList.remove('loading');
                summarizeBtn.disabled = false;
                btnText.textContent = 'Summarize Email';
            }
        });

        async function generateEmailSummary(text) {
            // Extract email metadata
            const fromMatch = text.match(/From:\s*([^\n]+)/i);
            const subjectMatch = text.match(/Subject:\s*([^\n]+)/i);

            const from = fromMatch ? fromMatch[1].trim() : 'Unknown';
            const subject = subjectMatch ? subjectMatch[1].trim() : 'No subject';

            // Use Ollama to generate summary
            const prompt = `Summarize this email concisely. Extract key points and action items.

Email:
${text.substring(0, 2000)}

Provide:
1. A 2-3 sentence summary
2. Key points (bullet list)
3. Any action items or deadlines

Format your response as:
SUMMARY: [summary text]
KEY POINTS:
- [point 1]
- [point 2]
ACTION ITEMS:
- [action 1]`;

            // Call Ollama via IPC (we'll add this handler)
            let aiResponse = '';
            try {
                // For now, use a simple analysis
                aiResponse = await analyzeWithSimplePrompt(prompt);
            } catch (error) {
                console.error('AI analysis failed:', error);
                aiResponse = `SUMMARY: Email from ${from} regarding ${subject}
KEY POINTS:
- Review required
ACTION ITEMS:
- Read and respond`;
            }

            return {
                from,
                subject,
                summary: extractSection(aiResponse, 'SUMMARY'),
                keyPoints: extractList(aiResponse, 'KEY POINTS'),
                actionItems: extractList(aiResponse, 'ACTION ITEMS'),
                timestamp: Date.now()
            };
        }

        async function analyzeWithSimplePrompt(prompt) {
            // This will use the existing Ollama integration
            return new Promise((resolve, reject) => {
                if (window.api) {
                    window.api.send('manual-analysis', { query: prompt });
                    window.api.once('analysis-result', (result) => {
                        resolve(result);
                    });

                    // Timeout after 10 seconds
                    setTimeout(() => reject(new Error('Analysis timeout')), 10000);
                } else {
                    reject(new Error('API not available'));
                }
            });
        }

        function extractSection(text, section) {
            const regex = new RegExp(`${section}:\\s*([^\\n]+(?:\\n(?!KEY POINTS|ACTION ITEMS)[^\\n]+)*)`, 'i');
            const match = text.match(regex);
            return match ? match[1].trim() : 'No summary available';
        }

        function extractList(text, section) {
            const regex = new RegExp(`${section}:([^]*?)(?=\\n[A-Z]+:|$)`, 'i');
            const match = text.match(regex);
            if (!match) return [];

            return match[1]
                .split('\n')
                .filter(line => line.trim().startsWith('-'))
                .map(line => line.replace(/^- \s*/, '').trim());
        }

        function displaySummary(summary) {
            summarySection.classList.remove('empty');
            summarySection.innerHTML = `
                <div class="summary-header">
                    <div class="summary-meta">From: ${summary.from}</div>
                    <div class="summary-subject">${summary.subject}</div>
                </div>
                <div class="summary-content">
                    ${summary.summary}
                </div>
                ${summary.keyPoints.length > 0 ? `
                    <div class="summary-points">
                        <div class="summary-points-title">Key Points:</div>
                        <ul>
                            ${summary.keyPoints.map(point => `<li>${point}</li>`).join('')}
                        </ul>
                    </div>
                ` : ''}
                ${summary.actionItems.length > 0 ? `
                    <div class="summary-points">
                        <div class="summary-points-title">Action Items:</div>
                        <ul>
                            ${summary.actionItems.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                ` : ''}
            `;
        }

        function addToHistory(summary) {
            const historyList = document.getElementById('historyList');
            const timeAgo = 'Just now';

            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `
                <div class="history-item-title">${summary.subject}</div>
                <div class="history-item-time">${timeAgo}</div>
            `;

            historyItem.addEventListener('click', () => {
                displaySummary(summary);
            });

            historyList.insertBefore(historyItem, historyList.firstChild);

            // Keep only last 10 items
            while (historyList.children.length > 10) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.metaKey || e.ctrlKey) {
                if (e.shiftKey && e.key === 'E') {
                    e.preventDefault();
                    summarizeBtn.click();
                } else if (e.key === 'h') {
                    e.preventDefault();
                    document.getElementById('historyHeader').click();
                }
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 60px;
  height: 60px;
  background: transparent;
  overflow: hidden;
  pointer-events: none;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Premium floating feel */
.icon-container {
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: pointer;
  -webkit-app-region: no-drag;
  position: relative;
  pointer-events: auto;
}

/* Softer hover */
.icon-container:hover {
  transform: scale(1.06);
}

/* Subtle breathing animation */
@keyframes breathe {
  0% { transform: scale(1); }
  50% { transform: scale(1.015); }
  100% { transform: scale(1); }
}

.bear-svg {
  width: 38px;
  height: 38px;
  animation: breathe 3.5s ease-in-out infinite;
  filter:
    drop-shadow(0 6px 18px rgba(0,0,0,0.18))
    drop-shadow(0 2px 6px rgba(0,0,0,0.12));
}

/* Refined stroke for crisp premium look */
.bear-ear {
  fill: #FFFFFF;
  stroke: rgba(0,0,0,0.06);
  stroke-width: 1;
}

.bear-face {
  fill: #FFFFFF;
  stroke: rgba(0,0,0,0.06);
  stroke-width: 1;
}

.bear-nose {
  fill: #111111;
}

/* Eye positioning smoother */
.eyes-container {
  position: absolute;
  top: 22px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
}

.eye {
  width: 4px;
  height: 4px;
  background: #111111;
  border-radius: 50%;
  position: relative;
  transition: transform 0.06s linear;
}
</style>
</head>

<body>

<div class="icon-container" id="iconBtn">

<svg viewBox="0 0 40 40" class="bear-svg">
  <!-- Left Ear -->
  <circle cx="10" cy="12" r="6" class="bear-ear" />
  <!-- Right Ear -->
  <circle cx="30" cy="12" r="6" class="bear-ear" />
  
  <!-- Head -->
  <ellipse cx="20" cy="22" rx="16" ry="14" class="bear-face" />

  <!-- Nose (Snout) -->
  <ellipse cx="20" cy="26" rx="6" ry="4" fill="#F4F4F4" />
  <ellipse cx="20" cy="25" rx="3" ry="2" class="bear-nose" />
</svg>

<div class="eyes-container">
  <div class="eye" id="leftEye"></div>
  <div class="eye" id="rightEye"></div>
</div>

</div>

<script src="floating-icon.js"></script>

</body>
</html>

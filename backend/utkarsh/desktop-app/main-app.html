<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <title>Metrixa AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FFFFFF;
            color: #1A1A1A;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar - Minimalist Icon Style */
        .sidebar {
            width: 72px;
            background: #FFFFFF;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            gap: 24px;
            flex-shrink: 0;
            -webkit-app-region: drag;
        }

        .sidebar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
            -webkit-app-region: no-drag;
        }

        .sidebar-icon:hover {
            background: #F4F4F4;
            color: #111;
        }

        .sidebar-icon.active {
            background: #F4F4F4;
            color: #111;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .sidebar-icon svg {
            width: 22px;
            height: 22px;
            stroke-width: 2;
        }

        /* Polar Bear specific styling */
        .bear-ear { fill: #FFFFFF; stroke: #EAEAEA; stroke-width: 1.5; }
        .bear-face { fill: #FFFFFF; stroke: #EAEAEA; stroke-width: 1.5; }
        .bear-eye { fill: #111111; }
        .bear-snout { fill: #F4F4F4; }
        .bear-nose { fill: #111111; }

        .sidebar-spacer {
            flex: 1;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #FFFFFF;
            position: relative;
            overflow: hidden;
        }

        /* Traffic Lights */
        .header-controls {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }
        .light.close { background: #ff5f57; }
        .light.minimize { background: #febc2e; }
        .light.expand { background: #28c840; }

        /* Dashboard View */
        .dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .greeting-container {
            margin-bottom: 48px;
        }

        .ghost-emoji {
            font-size: 32px;
            margin-bottom: 16px;
            display: block;
        }

        .greeting-text {
            font-size: 36px;
            font-weight: 600;
            color: #111;
            letter-spacing: -0.02em;
        }

        /* Search Area - Ghost Style Capsule */
        .search-area {
            width: 100%;
            max-width: 720px;
            position: relative;
        }

        .search-capsule {
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .search-capsule:focus-within {
            border-color: #111;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        #chatInput {
            width: 100%;
            padding: 12px 16px;
            font-size: 18px;
            border: none;
            outline: none;
            color: #111;
            background: transparent;
            font-family: inherit;
        }

        #chatInput::placeholder {
            color: #999;
        }

        .search-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px 4px;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #F4F4F4;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .model-selector:hover {
            color: #111;
            background: #EEE;
        }

        .model-selector svg {
            width: 14px;
            height: 14px;
        }

        .search-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .action-icon {
            color: #999;
            cursor: pointer;
            transition: color 0.2s;
        }

        .action-icon:hover {
            color: #111;
        }

        .send-btn {
            width: 32px;
            height: 32px;
            background: #000;
            color: #FFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        /* Action Chips */
        .action-chips {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .chip {
            padding: 10px 20px;
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #111;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            background: #F4F4F4;
            border-color: rgba(0, 0, 0, 0.2);
            transform: translateY(-1px);
        }

        /* Chat View (Hidden by default) */
        .chat-view {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 80px 40px 140px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
        }

        .msg {
            margin-bottom: 32px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            font-size: 24px;
            font-weight: 600;
            color: #111;
            line-height: 1.2;
        }

        .msg.ai {
            font-size: 16px;
            color: #444;
            line-height: 1.7;
        }

        /* Pixels Mode Overlay */
        #pixelsOverlay {
            position: fixed;
            top: 0;
            left: 72px;
            width: calc(100vw - 72px);
            height: 100vh;
            pointer-events: none;
            z-index: 500;
            display: none;
        }

        .pixel-element {
            position: absolute;
            border: 2px solid #74D4FB;
            background: rgba(116, 212, 251, 0.1);
            border-radius: 4px;
            pointer-events: auto;
            cursor: crosshair;
        }

        .hidden { display: none !important; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #EEE; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-icon active" title="Dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <div class="sidebar-icon" id="floatingPanelToggle" title="Toggle Agent Panel">
                 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            </div>
            <div class="sidebar-icon" id="pixelsToggle" title="Pixels Mode">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
            </div>
            <div class="sidebar-spacer"></div>
            <div class="sidebar-icon" id="settingsBtn" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header-controls">
                <div class="light close" id="closeBtn"></div>
                <div class="light minimize" id="minimizeBtn"></div>
                <div class="light expand" id="maximizeBtn"></div>
            </div>

            <!-- Dashboard View -->
            <div class="dashboard" id="dashboardView">
                <div class="greeting-container">
                    <div style="width: 48px; height: 48px; margin: 0 auto 16px auto;">
                        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Left Ear -->
                            <circle cx="10" cy="12" r="6" class="bear-ear" />
                            <!-- Right Ear -->
                            <circle cx="30" cy="12" r="6" class="bear-ear" />
                            <!-- Head -->
                            <ellipse cx="20" cy="22" rx="16" ry="14" class="bear-face" />
                            <!-- Eyes -->
                            <circle cx="14" cy="20" r="2.5" class="bear-eye" />
                            <circle cx="26" cy="20" r="2.5" class="bear-eye" />
                            <!-- Nose (Snout) -->
                            <ellipse cx="20" cy="26" rx="6" ry="4" class="bear-snout" />
                            <ellipse cx="20" cy="25" rx="3" ry="2" class="bear-nose" />
                        </svg>
                    </div>
                    <h1 class="greeting-text">Happy Monday, Byte!</h1>
                </div>

                <div class="search-area">
                    <div class="search-capsule">
                        <textarea id="chatInput" placeholder="Ask me anything..." rows="1"></textarea>
                        <div class="search-footer">
                            <div class="model-selector">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                                <span>Claude Opus 4.6</span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div class="search-actions">
                                <span class="action-icon" title="Add file">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                                </span>
                                <button class="send-btn" id="sendBtn">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="action-chips">
                        <button class="chip" data-query="Let's work">Let's work</button>
                        <button class="chip" data-query="What are my tasks for today?">Let's learn</button>
                        <button class="chip" data-query="Search my life">Search my life</button>
                        <button class="chip" data-query="Summarize my day">Coach me</button>
                    </div>
                </div>
            </div>

            <!-- Chat View -->
            <div class="chat-view" id="chatView">
                <!-- Messages will appear here -->
            </div>
        </div>
    </div>

    <div id="pixelsOverlay"></div>

    <script>
        // IPC Logic
        let ipc;
        try {
            if (window.api) ipc = window.api;
            else {
                const { ipcRenderer } = require('electron');
                ipc = {
                    invoke: (c, ...a) => ipcRenderer.invoke(c, ...a),
                    send: (c, d) => ipcRenderer.send(c, d),
                    on: (c, f) => ipcRenderer.on(c, (e, ...a) => f(...a))
                };
            }
        } catch(e) { console.error('IPC init failed'); }

        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const dashboardView = document.getElementById('dashboardView');
        const chatView = document.getElementById('chatView');

        // Auto-resize textarea
        chatInput.addEventListener('input', () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
        });

        function addMessage(type, text) {
            dashboardView.style.display = 'none';
            chatView.style.display = 'flex';
            
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            chatView.appendChild(div);
            chatView.scrollTop = chatView.scrollHeight;
        }

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';

            const loadingId = 'loading-' + Date.now();
            const loadingHtml = `<div class="msg ai" id="${loadingId}">Thinking...</div>`;
            chatView.insertAdjacentHTML('beforeend', loadingHtml);
            
            try {
                // Get context
                let ctx = null;
                try {
                    const ctxRes = await ipc.invoke('detect-context');
                    if (ctxRes && ctxRes.success) ctx = ctxRes.data;
                } catch(e) {}

                // Plan
                document.getElementById(loadingId).innerHTML = 'Planning steps...';
                const planResult = await ipc.invoke('create-plan', { intent: text, context: ctx });
                if (!planResult.success) throw new Error(planResult.error);
                
                // Execute
                document.getElementById(loadingId).innerHTML = 'Working on it...';
                const execResult = await ipc.invoke('execute-plan', { plan: planResult.data, context: ctx });
                if (!execResult.success) throw new Error(execResult.error);
                
                document.getElementById(loadingId).remove();
                addMessage('ai', execResult.summary || 'Done!');
            } catch (err) {
                document.getElementById(loadingId).remove();
                addMessage('ai', `<span style="color:#ff3b30">Error: ${err.message}</span>`);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Wire chips
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                chatInput.value = chip.dataset.query || chip.textContent;
                chatInput.style.height = 'auto'; // reset
                handleSend();
            });
        });

        ipc.on('analysis-result', (data) => {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
            addMessage('ai', data);
        });

        // Pixels Mode Logic
        const pixelsToggle = document.getElementById('pixelsToggle');
        const pixelsOverlay = document.getElementById('pixelsOverlay');
        let pixelsMode = false;

        pixelsToggle.addEventListener('click', async () => {
            pixelsMode = !pixelsMode;
            pixelsToggle.classList.toggle('active', pixelsMode);
            pixelsOverlay.style.display = pixelsMode ? 'block' : 'none';

            if (pixelsMode) {
                addMessage('ai', 'Scanning screen for interactive elements...');
                try {
                    const result = await ipc.invoke('get-screen-text');
                    pixelsOverlay.innerHTML = '';
                    if (result.words) {
                        result.words.forEach(word => {
                            if (word.confidence < 30) return;
                            const el = document.createElement('div');
                            el.className = 'pixel-element';
                            const { x0, y0, x1, y1 } = word.bbox;
                            el.style.left = `${x0}px`;
                            el.style.top = `${y0}px`;
                            el.style.width = `${x1 - x0}px`;
                            el.style.height = `${y1 - y0}px`;
                            el.addEventListener('click', () => {
                                ipc.send('gui-click', { x: x0 + (x1-x0)/2, y: y0 + (y1-y0)/2 });
                            });
                            pixelsOverlay.appendChild(el);
                        });
                    }
                } catch(e) { console.error(e); }
            }
        });

        // Window Controls
        document.getElementById('minimizeBtn').onclick = () => ipc.send('minimize-window');
        document.getElementById('maximizeBtn').onclick = () => ipc.send('maximize-window');
        document.getElementById('closeBtn').onclick = () => ipc.send('close-window');
        document.getElementById('floatingPanelToggle').onclick = () => ipc.send('toggle-floating-panel');

        // Context updates
        ipc.on('context-updated', (ctx) => {
            console.log('Context updated:', ctx);
        });
    </script>
</body>
</html>

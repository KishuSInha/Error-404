<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left Ear -->
  <circle cx="10" cy="12" r="6" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="1.5" />
  <!-- Right Ear -->
  <circle cx="30" cy="12" r="6" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="1.5" />
  <!-- Head -->
  <ellipse cx="20" cy="22" rx="16" ry="14" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="1.5" />
  <!-- Eyes -->
  <circle cx="14" cy="20" r="2.5" fill="#111111" />
  <circle cx="26" cy="20" r="2.5" fill="#111111" />
  <!-- Nose (Snout) -->
  <ellipse cx="20" cy="26" rx="6" ry="4" fill="#F4F4F4" />
  <ellipse cx="20" cy="25" rx="3" ry="2" fill="#111111" />
</svg>

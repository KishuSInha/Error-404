<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrixa AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #111;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        /* Header */
        .header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            -webkit-app-region: drag;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .traffic-lights {
            display: flex;
            gap: 7px;
            -webkit-app-region: no-drag;
        }

        .light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 0.5px solid rgba(0,0,0,0.1);
        }
        .light.close   { background: #ff5f57; }
        .light.minimize { background: #febc2e; }
        .light.expand  { background: #28c840; }

        .header-title {
            font-size: 13px;
            font-weight: 500;
            color: #888;
            -webkit-app-region: no-drag;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        /* Context pill */
        .context-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            background: #f4f4f4;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #555;
            cursor: default;
            user-select: none;
        }

        .context-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #28c840;
            flex-shrink: 0;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 28px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar { width: 4px; }
        .messages-container::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 2px; }

        /* Welcome */
        .welcome-container {
            display: flex;
            flex-direction: column;
            padding: 40px 0 20px;
        }

        .welcome-title {
            font-size: 26px;
            font-weight: 600;
            color: #111;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* Quick chips */
        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-chip {
            padding: 7px 14px;
            background: #f4f4f4;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .quick-chip:hover {
            background: #e5e5e5;
            transform: translateY(-1px);
        }

        /* Message Styles */
        .message {
            display: flex;
            flex-direction: column;
            padding: 18px 0;
            animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .message + .message {
            border-top: 1px solid rgba(0,0,0,0.04);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user .message-bubble {
            font-size: 20px;
            font-weight: 600;
            color: #111;
            line-height: 1.25;
            letter-spacing: -0.01em;
        }

        .message.ai .message-bubble {
            font-size: 15px;
            color: #333;
            line-height: 1.75;
        }

        .message.ai .message-bubble strong { color: #111; font-weight: 600; }
        .message.ai .message-bubble em { color: #555; font-style: italic; }

        /* Plan steps indicator */
        .plan-steps {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .plan-step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #888;
            padding: 3px 0;
            animation: slideIn 0.2s ease;
        }

        .plan-step.running  { color: #007aff; }
        .plan-step.done     { color: #28c840; }
        .plan-step.error    { color: #ff3b30; }

        .step-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.5px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 9px;
        }

        .plan-step.running .step-icon {
            animation: spin 0.8s linear infinite;
            border-top-color: transparent;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Typing cursor */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #007aff;
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Status line */
        .status-line {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #007aff;
            padding: 6px 0;
        }

        .status-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,122,255,0.2);
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        /* Input Area */
        .input-area {
            padding: 0 20px 20px;
            flex-shrink: 0;
        }

        .input-outer {
            background: #f9f9f9;
            border: 1px solid rgba(0,0,0,0.09);
            border-radius: 22px;
            padding: 6px 8px 6px 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            transition: all 0.2s;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .input-outer:focus-within {
            border-color: rgba(0,0,0,0.2);
            background: #fff;
            box-shadow: 0 8px 28px rgba(0,0,0,0.07);
        }

        #taskInput {
            flex: 1;
            min-height: 36px;
            max-height: 160px;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: #111;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        #taskInput::placeholder { color: #bbb; }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            padding-bottom: 4px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            color: #bbb;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .icon-btn:hover { background: #f0f0f0; color: #666; }
        .icon-btn svg { width: 17px; height: 17px; }

        .send-btn {
            width: 32px;
            height: 32px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) { background: #333; transform: scale(1.05); }
        .send-btn:disabled { background: #e0e0e0; cursor: not-allowed; }
        .send-btn.stop { background: #ff3b30; }
        .send-btn svg { width: 15px; height: 15px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="traffic-lights">
                    <div class="light close"    id="closeBtn"></div>
                    <div class="light minimize" id="minimizeBtn"></div>
                    <div class="light expand"></div>
                </div>
                <span class="header-title">Metrixa AI</span>
            </div>
            <div class="header-right">
                <div class="context-pill" id="contextPill">
                    <div class="context-dot"></div>
                    <span id="contextAppName">Ready</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-container" id="welcomeContainer">
                    <h1 class="welcome-title">Hey! What can I help you with?</h1>
                    <p class="welcome-subtitle">Ask me to summarize, automate, search, or control any app on your Mac.</p>
                    <div class="quick-chips" id="quickChips">
                        <button class="quick-chip" data-query="Summarize what's on my screen">📋 Summarize screen</button>
                        <button class="quick-chip" data-query="What are the action items here?">✅ Extract tasks</button>
                        <button class="quick-chip" data-query="What's on my calendar today?">📅 Today's events</button>
                        <button class="quick-chip" data-query="Create a note from what's on screen">📝 Save as note</button>
                        <button class="quick-chip" data-query="Copy a summary to my clipboard">📋 Copy summary</button>
                        <button class="quick-chip" data-query="Create a reminder from this">⏰ Add reminder</button>
                    </div>
                </div>
            </div>
        </main>

        <div class="input-area">
            <div class="input-outer">
                <textarea id="taskInput" placeholder="Ask me anything..." rows="1"></textarea>
                <div class="input-actions">
                    <button class="send-btn" id="sendBtn" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="19" x2="12" y2="5"/>
                            <polyline points="5 12 12 5 19 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="floating-panel.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
      }

      html,
      body {
        width: 430px;
        height: 610px;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      .panel {
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        width: calc(100% - 10px);
        height: calc(100% - 10px);
        margin: 5px;
        border: 1px solid #d0c2b0;
        border-radius: 12px;
        background: #fffdf8;
        box-shadow: 0 18px 48px rgba(23, 32, 42, 0.24);
        overflow: hidden;
      }

      .head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid #eadfce;
        -webkit-app-region: drag;
      }

      .identity {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .identity-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid #dbe3ef;
        border-radius: 11px;
        background: #fff;
        color: #2563eb;
        font-size: 12px;
        font-weight: 900;
        box-shadow: 0 5px 14px rgba(23, 32, 42, 0.08);
      }

      .head strong,
      .head span {
        display: block;
      }

      .head span {
        color: #65717d;
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 8px;
        -webkit-app-region: no-drag;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #152238;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      .actions button {
        min-width: 38px;
        padding: 9px 11px;
      }

      .tee {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 14px 16px 10px;
        padding: 10px 12px;
        border-radius: 999px;
        background: #dfeee8;
        color: #235545;
        font-size: 13px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #18745f;
        box-shadow: 0 0 0 5px rgba(24, 116, 95, 0.14);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 16px 12px;
      }

      .chips button {
        padding: 8px 10px;
        border-radius: 999px;
        background: #f1e6d6;
        color: #26313d;
        font-size: 13px;
      }

      .steps {
        display: grid;
        gap: 7px;
        padding: 0 16px 12px;
      }

      .step {
        display: grid;
        grid-template-columns: 32px 1fr;
        gap: 8px;
        align-items: center;
        padding: 9px;
        border-radius: 8px;
        background: #f8f1e7;
        color: #34414f;
        font-size: 13px;
      }

      .icon {
        display: grid;
        width: 26px;
        height: 26px;
        place-items: center;
        border-radius: 50%;
        background: #fff;
        color: #65717d;
        font-size: 10px;
        font-weight: 900;
      }

      .step.running .icon {
        background: #f3d398;
        color: #152238;
      }

      .step.done .icon {
        background: #18745f;
        color: #fff;
      }

      .step.error .icon {
        background: #ad2f2f;
        color: #fff;
      }

      .messages {
        display: grid;
        align-content: start;
        gap: 9px;
        padding: 0 16px 16px;
        overflow: auto;
      }

      .message {
        margin: 0;
        padding: 11px;
        border-radius: 8px;
        line-height: 1.35;
      }

      .message.ai {
        background: #f1e6d6;
      }

      .message.user {
        background: #152238;
        color: #fff;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 14px 16px 16px;
        border-top: 1px solid #eadfce;
      }

      textarea {
        min-width: 0;
        max-height: 130px;
        padding: 11px;
        border: 1px solid #d8ccba;
        border-radius: 8px;
        resize: none;
        font: inherit;
      }

      form button {
        padding: 10px 15px;
        background: #18745f;
      }

      form button.stop {
        background: #ad2f2f;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <header class="head">
        <div class="identity">
          <div class="identity-mark">TP</div>
          <div>
            <strong>TaskPilot AI</strong>
            <span id="context">Detecting context...</span>
          </div>
        </div>
        <div class="actions">
          <button id="ocr">TEE OCR</button>
          <button id="main">App</button>
          <button id="hide">x</button>
        </div>
      </header>

      <div class="tee">
        <span class="dot"></span>
        <strong>TEE attested</strong>
        <span id="hash">tp-340285ac</span>
      </div>

      <div class="chips">
        <button data-query="What should I do now?">What should I do now?</button>
        <button data-query="Secure OCR scan">Secure OCR scan</button>
        <button data-query="Summarize emails">Summarize emails</button>
        <button data-query="Explain duplicates">Explain duplicates</button>
      </div>

      <div class="steps" id="steps"></div>
      <div class="messages" id="messages">
        <p class="message ai">I am now a real floating desktop agent. I stay above apps, watch context with TEE safeguards, and wait for your approval before execution.</p>
      </div>

      <form id="form">
        <textarea id="input" rows="1" placeholder="Ask, plan, scan, or execute with approval..."></textarea>
        <button id="send">Send</button>
      </form>
    </section>

    <script>
      const contextEl = document.getElementById("context");
      const messages = document.getElementById("messages");
      const stepsEl = document.getElementById("steps");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const send = document.getElementById("send");
      let processing = false;
      let runId = 0;

      refreshContext();

      document.getElementById("hide").addEventListener("click", () => window.taskPilotFloating.hidePanel());
      document.getElementById("main").addEventListener("click", () => window.taskPilotFloating.restoreMain());
      document.getElementById("ocr").addEventListener("click", () => runWorkflow("Secure OCR scan", true));

      document.querySelectorAll("[data-query]").forEach((button) => {
        button.addEventListener("click", () => runWorkflow(button.dataset.query, /ocr|scan|screen/i.test(button.dataset.query)));
      });

      input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 130) + "px";
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
        if (event.key === "Escape") window.taskPilotFloating.hidePanel();
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        if (processing) {
          stop();
          return;
        }
        const value = input.value.trim();
        if (!value) return;
        input.value = "";
        input.style.height = "auto";
        runWorkflow(value, /ocr|scan|screen/i.test(value));
      });

      async function refreshContext() {
        const result = await window.taskPilotFloating.detectContext().catch(() => null);
        contextEl.textContent = result?.data?.app?.name || "Ready on screen";
      }

      async function runWorkflow(intent, captureScreen = false) {
        if (processing) return;
        processing = true;
        runId += 1;
        const currentRun = runId;
        send.textContent = "Stop";
        send.classList.add("stop");
        addMessage("user", intent);

        const planResult = await window.taskPilotFloating.createPlan({ intent });
        const steps = planResult.data.steps.map((step) => ({ ...step, status: "pending" }));
        renderSteps(steps);

        try {
          await setStep(currentRun, steps, "context", "running", "Detecting foreground context");
          await wait(220);
          await refreshContext();
          await setStep(currentRun, steps, "context", "done", contextEl.textContent + " detected");

          await setStep(currentRun, steps, "tee", "running", "Sealing minimized payload");
          await wait(240);
          await setStep(currentRun, steps, "tee", "done", "TEE payload sealed and redacted");

          await setStep(currentRun, steps, "reason", "running", "Reasoning over urgency, blockers, and business impact");
          let summary;
          if (captureScreen) {
            const capture = await window.taskPilotFloating.captureScreen();
            summary = `TEE OCR ready from ${capture.name}. Frame is ephemeral, redacted before external calls, and mapped to the current task plan.`;
          } else {
            const exec = await window.taskPilotFloating.executePlan({ intent });
            summary = exec.summary;
          }
          await setStep(currentRun, steps, "reason", "done", "Recommendation prepared");

          await setStep(currentRun, steps, "approval", "running", "Waiting for user approval");
          await wait(160);
          await setStep(currentRun, steps, "approval", "done", "No action executed without approval");

          if (currentRun === runId) addMessage("ai", summary);
        } catch (error) {
          if (currentRun === runId) addMessage("ai", "Stopped safely: " + error.message);
        } finally {
          if (currentRun === runId) {
            processing = false;
            send.textContent = "Send";
            send.classList.remove("stop");
          }
        }
      }

      async function setStep(currentRun, steps, id, status, description) {
        if (currentRun !== runId) throw new Error("cancelled");
        const step = steps.find((item) => item.id === id);
        if (step) {
          step.status = status;
          step.description = description;
        }
        renderSteps(steps);
      }

      function renderSteps(steps) {
        stepsEl.innerHTML = steps
          .map((step) => `<div class="step ${step.status || "pending"}"><span class="icon">${icon(step.status)}</span><span>${escapeHtml(step.description)}</span></div>`)
          .join("");
      }

      function addMessage(role, text) {
        const message = document.createElement("p");
        message.className = "message " + role;
        message.textContent = text;
        messages.appendChild(message);
        messages.scrollTo({ top: messages.scrollHeight, behavior: "smooth" });
      }

      function stop() {
        runId += 1;
        processing = false;
        send.textContent = "Send";
        send.classList.remove("stop");
        addMessage("ai", "Stopped safely. No external call or execution continued.");
      }

      function icon(status) {
        if (status === "running") return "...";
        if (status === "done") return "OK";
        if (status === "error") return "!";
        return "o";
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function escapeHtml(value) {
        return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
      }
    </script>
  </body>
</html>
